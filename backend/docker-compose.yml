services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzas_postgres
    environment:
      POSTGRES_USER: jeissonmr
      POSTGRES_PASSWORD: A1Wh9zjvcE
      POSTGRES_DB: finanzas_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jeissonmr -d finanzas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: finanzas_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finanzas_api
    ports:
      - "3000:3000"
    env_file:
      - .env
    # environment:
    #   DATABASE_URL: postgresql://jeissonmr:finanzas_pass@postgres:5432/finanzas_db
    #   REDIS_HOST: redis
    #   REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

volumes:
  postgres_data:
  redis_data:
