services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finanzas_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: finanzas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  api:
    build: .
    ports:
      - "4000:3000"
    environment:
      DATABASE_URL: postgresql://finanzas_user:${DB_PASSWORD}@postgres:5432/finanzas_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data: